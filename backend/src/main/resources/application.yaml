spring:
  application:
    name: e-karigor-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ekarigordb}
    username: ${DB_USER:ekarigor}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  mybatis:
    mapper-locations: classpath:mapper/*.xml
    type-aliases-package: com.e_karigor.api
    configuration:
      map-underscore-to-camel-case: true
      default-fetch-size: 100
      default-statement-timeout: 30

#  sql:
#    init:
#      mode: always
#      data-locations: classpath:data.sql

server:
  port: 8080
  servlet:
    context-path: /

jwt:
  secret: ${JWT_SECRET:ekarigor-secret-key-change-in-production-min-256-bits}
  expiration: 86400000  # 24 hours in milliseconds

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:your-cloud-name}
  api-key: ${CLOUDINARY_API_KEY:your-api-key}
  api-secret: ${CLOUDINARY_API_SECRET:your-api-secret}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173,https://e-karigor.vercel.app}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.e_karigor: DEBUG
    org.springframework.security: INFO